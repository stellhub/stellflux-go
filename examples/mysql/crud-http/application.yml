app:
  name: stellar-mysql-example
  env: dev
  zone: local

http:
  server:
    enabled: true
    port: 18082
    adapter: gin
    observability:
      trace: true
      metrics: true
      logs: true

mysql:
  enabled: true
  dsn: user:password@tcp(localhost:3306)/stellar?parseTime=true
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m
  ping_on_startup: false
  debug_api:
    enabled: true
    prefix: /mysql
  observability:
    trace: true
    metrics: true
    logs: true

opentelemetry:
  log:
    enabled: false
    output: stdout
  trace: false
  metrics: false
  trace_output: none
