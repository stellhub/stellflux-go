app:
  name: stellar-http-client-simple-example
  env: dev
  zone: local

http:
  client:
    enabled: true
    timeout: 3s
    max_idle_conns: 100
    max_idle_conns_per_host: 10
    idle_conn_timeout: 90s
    observability:
      trace: true
      metrics: true
      logs: true
    clients:
      user-service:
        base_url: http://127.0.0.1:18085
        timeout: 2s

opentelemetry:
  log:
    enabled: false
    output: stdout
  trace: false
  metrics: false
  trace_output: none
  metrics_output: prometheus
